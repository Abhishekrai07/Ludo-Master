            if(e.keyCode == 123) { return false; }
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) { return false; }
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) { return false; }
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) { return false; }

</head>

        // --- NEW: WEBRTC VOICE CHAT LOGIC ---
        function initVoiceChat() {
            if(peer) return;
            document.getElementById('mic-btn').style.display = 'flex';
            
            let myPeerId = "ludomaster-" + roomCode + "-" + myOnlineId + "-" + Math.floor(Math.random()*10000);
            peer = new Peer(myPeerId);
            
            peer.on('open', (id) => {
                db.ref(`rooms/${roomCode}/voice/${myOnlineId}`).set(id);
                db.ref(`rooms/${roomCode}/voice/${myOnlineId}`).onDisconnect().remove();
            });

            peer.on('call', (call) => {
                if (myAudioStream) { call.answer(myAudioStream); } else { call.answer(); }
                handleCallStream(call);
            });

            db.ref(`rooms/${roomCode}/voice`).on('child_added', snapshot => {
                let pId = snapshot.key; let peerStr = snapshot.val();
                if (pId != myOnlineId) connectToPeer(peerStr);
            });
            
            db.ref(`rooms/${roomCode}/voice`).on('child_changed', snapshot => {
                let pId = snapshot.key; let peerStr = snapshot.val();
                if (pId != myOnlineId) connectToPeer(peerStr);
            });
        }

        function connectToPeer(peerStr) {
            if (!peer) return;
            let call = myAudioStream ? peer.call(peerStr, myAudioStream) : peer.call(peerStr);
            if(call) handleCallStream(call);
        }

        function handleCallStream(call) {
            peerConnections[call.peer] = call;
            call.on('stream', (remoteStream) => {
                if(!document.getElementById('audio-' + call.peer)) {
                    let aud = document.createElement('audio');
                    aud.id = 'audio-' + call.peer;
                    aud.srcObject = remoteStream;
                    aud.autoplay = true;
                    aud.setAttribute('playsinline', 'true'); 
                    document.getElementById('audio-container').appendChild(aud);
                }
            });
            call.on('close', () => {
                let aud = document.getElementById('audio-' + call.peer);
                if(aud) aud.remove();
                delete peerConnections[call.peer];
            });
        }

        async function toggleMic() {
            let btn = document.getElementById('mic-btn');
            if (!myAudioStream) {
                try {
                    myAudioStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                    isMicEnabled = true; btn.classList.remove('mic-off'); btn.innerText = '🎤';
                    
                    // Broadcast new stream to all
                    Object.values(peerConnections).forEach(c => c.close());
                    peerConnections = {};
                    db.ref(`rooms/${roomCode}/voice`).once('value', snapshot => {
                        snapshot.forEach(child => { if (child.key != myOnlineId) connectToPeer(child.val()); });
                    });
                } catch(e) { alert("Microphone access denied! Please allow permissions."); }
            } else {
                isMicEnabled = !isMicEnabled;
                myAudioStream.getAudioTracks().forEach(track => track.enabled = isMicEnabled);
                if (isMicEnabled) { btn.classList.remove('mic-off'); btn.innerText = '🎤'; } else { btn.classList.add('mic-off'); btn.innerText = '🔇'; }
            }
        }

        function diceClicked(playerIndex, isAutoCall = false) {
            if (!isAutoCall) { if (playerIndex !== currentTurn) return; if (gameMode === 'bot' && playersInfo[currentTurn].isBot) return; if (gameMode === 'online' && myOnlineId !== currentTurn) return; }
            if (isRolled || isAnimating || isRolling || isActionPending || finishedPlayers.includes(currentTurn)) return; 
            
            isActionPending = true; 
            try {
                if (!diceBags[playerIndex] || diceBags[playerIndex].length <= 2) {
                    diceBags[playerIndex] = [1, 2, 3, 4, 5, 6];
                    for (let i = diceBags[playerIndex].length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [diceBags[playerIndex][i], diceBags[playerIndex][j]] = [diceBags[playerIndex][j], diceBags[playerIndex][i]]; }
                }
                let result = diceBags[playerIndex].pop();
                if (gameMode === 'online') { 
                    db.ref(`rooms/${roomCode}/action`).set({ type: 'ROLL', by: playerIndex, result: result, id: Date.now() }).catch(e => { isActionPending = false; }); 
                } else { 
                    actionQueue.push({ type: 'ROLL', by: playerIndex, result: result }); processNextAction(); 
                }
            } catch(e) { isActionPending = false; }
        }

        function executeRoll(playerIndex, result) {
            let activeDiceEl = document.getElementById(`dice-${currentTurn}`); activeDiceEl.innerText = '⌛'; playSfx(diceSound); triggerHaptic(50); 
            const handleRollComplete = () => {
                diceValue = result; activeDiceEl.innerText = diceFaces[diceValue - 1]; isRolled = true; 
                if(diceValue === 6) triggerHaptic([50, 50, 50]); 
                if (diceValue === 6) { 
                    consecutiveSixes++; if (consecutiveSixes === 3) { triggerHaptic([200, 100, 200]); consecutiveSixes = 0; isRolled = false; if (gameMode === 'online') { if (myOnlineId === 0) setTimeout(nextTurn, 500); } else { setTimeout(nextTurn, 500); } setRolling(false); return; } 
                } else { consecutiveSixes = 0; }
                checkPossibleMoves(); setRolling(false);
            };
            if (is3DDiceEnabled) { launch3DDice(result, playerIndex, handleRollComplete); } else { setTimeout(handleRollComplete, 350); }
        }

        function checkPossibleMoves() {
            let myTokens = tokens.filter(t => t.playerIndex === currentTurn);
            let validTokens = myTokens.filter(t => { if (t.state === 'base' && diceValue === 6) return true; if (t.state === 'path' && (t.pos + diceValue <= 56)) return true; return false; });
            tokens.forEach(t => t.el.classList.remove('highlight'));

            if (validTokens.length === 0) { 
                if (gameMode === 'online') { if (myOnlineId === 0) setTimeout(nextTurn, 500); } else { setTimeout(nextTurn, 500); }
            } else {
                if(gameMode === 'bot' && playersInfo[currentTurn].isBot) {
                    let bestToken = validTokens[0]; let maxScore = -1;
                    for(let t of validTokens) {
                        let score = 0; let nextPos = t.pos + diceValue;
                        if (t.state === 'base' && diceValue === 6) score += 60; else if (nextPos === 56) score += 80; else if (nextPos < 51) {
                            let globalIndex = (playersInfo[currentTurn].startIndex + nextPos) % 52; let isSafeStar = (globalIndex === 0 || globalIndex === 13 || globalIndex === 26 || globalIndex === 39 || globalIndex === 8 || globalIndex === 21 || globalIndex === 34 || globalIndex === 47);
                            if (isSafeStar) score += 40; let canKill = false; if (!isSafeStar) { tokens.forEach(enemy => { if (enemy.playerIndex !== currentTurn && enemy.state === 'path' && enemy.pos < 51 && activePlayers.includes(enemy.playerIndex)) { let enemyGlobalIndex = (playersInfo[enemy.playerIndex].startIndex + enemy.pos) % 52; if (enemyGlobalIndex === globalIndex) canKill = true; } }); }
                            if (canKill) score += 100; score += t.pos; 
                        } else { score += t.pos; }
                        if (score > maxScore) { maxScore = score; bestToken = t; }
                    }
                    setTimeout(() => tokenClicked(bestToken, true), 700);
                } else {
                    // NEW: Prevents BOTH host and client sending Auto-Move simultaneous to Firebase
                    if(gameMode !== 'online' || myOnlineId === currentTurn) {
                        if (validTokens.length === 1) { setTimeout(() => tokenClicked(validTokens[0], true), 350); } else { validTokens.forEach(t => t.el.classList.add('highlight')); }
                    }
                }
            }
        }

        function tokenClicked(t, isAutoCall = false) { 
            if (!isAutoCall) { if (t.playerIndex !== currentTurn) return; if (gameMode === 'bot' && playersInfo[currentTurn].isBot) return; if (gameMode === 'online' && myOnlineId !== currentTurn) return; }
            if (!isRolled || isAnimating || isRolling || isActionPending) return; 
            if (t.state === 'base' && diceValue !== 6) return; 
            if (t.state === 'path' && (t.pos + diceValue > 56)) return; 
            isActionPending = true; 
            try { 
                if (gameMode === 'online') { 
                    db.ref(`rooms/${roomCode}/action`).set({ type: 'MOVE', color: t.color, tokenId: t.id, id: Date.now() }).catch(e => { isActionPending = false; }); 
                } else { 
                    actionQueue.push({ type: 'MOVE', color: t.color, tokenId: t.id }); processNextAction(); 
                } 
            } catch(e) { isActionPending = false; }
        }

        function executeMove(t) {
            tokens.forEach(tok => tok.el.classList.remove('highlight')); 
            if (t.state === 'base' && diceValue === 6) { 
                t.state = 'path'; t.pos = 0; playSfx(spawnSound); triggerHaptic([50, 50, 100]); updateTokensPosition(); setTimeout(finalizeMove, 50); 
            } else if (t.state === 'path') {
                let stepsLeft = diceValue;
                function takeStep() {
                    t.pos++; stepsLeft--; playSfx(moveSound); triggerHaptic(20); updateTokensPosition();
                    if (stepsLeft > 0) { setTimeout(takeStep, 250); } else {
                        let killed = false; let isSafeStar = false;
                        if (t.pos === 56) { t.state = 'home'; playSfx(homeSound); triggerHaptic([100, 50, 100, 50, 100]); killed = true; updateTokensPosition(); } else if (t.pos < 51) {
                            let globalIndex = (playersInfo[currentTurn].startIndex + t.pos) % 52; isSafeStar = (globalIndex === 0 || globalIndex === 13 || globalIndex === 26 || globalIndex === 39 || globalIndex === 8 || globalIndex === 21 || globalIndex === 34 || globalIndex === 47);
                            tokens.forEach(enemy => { if (enemy.playerIndex !== currentTurn && enemy.state === 'path' && enemy.pos < 51 && activePlayers.includes(enemy.playerIndex)) { let enemyGlobalIndex = (playersInfo[enemy.playerIndex].startIndex + enemy.pos) % 52; if (!isSafeStar && enemyGlobalIndex === globalIndex) { enemy.state = 'base'; enemy.pos = -1; killed = true; playSfx(killSound); triggerHaptic([200, 50, 200]); updateTokensPosition(); } } });
                        }
                        if(killed) { diceValue = 6; consecutiveSixes = 0; } else if (isSafeStar && t.pos !== -1) { playSfx(safeSound); }
                        setTimeout(finalizeMove, 50); 
                    }
                }
                takeStep(); 
            } else { setAnimating(false); }
        }

        function checkWinCondition() {
            if(finishedPlayers.includes(currentTurn)) return false; let myTokens = tokens.filter(t => t.playerIndex === currentTurn); let homeTokens = myTokens.filter(t => t.pos === 56);
            if (homeTokens.length === 4) {
                finishedPlayers.push(currentTurn); document.getElementById(`panel-${currentTurn}`).classList.add('finished');
                let rank = finishedPlayers.length; let suffix = rank === 1 ? "st" : rank === 2 ? "nd" : "rd"; triggerHaptic([300, 100, 300, 100, 500]); 
                if (finishedPlayers.length >= activePlayers.length - 1) {
                    let lastPlayer = activePlayers.find(p => !finishedPlayers.includes(p)); if(lastPlayer !== undefined) finishedPlayers.push(lastPlayer); 
                    let leaderboardHtml = "<h3>Final Standings:</h3><br>"; finishedPlayers.forEach((pid, i) => { leaderboardHtml += `<div style="color:${playersInfo[pid].hex}; margin: 5px; font-weight: bold;">${i+1} Place: ${playersInfo[pid].name}</div>`; });
                    playSfx(gameOverSound); showModal("🏆 GAME OVER 🏆", leaderboardHtml, "#FFF200", true); document.getElementById('modal-btn').onclick = clearGameState; document.getElementById('modal-btn').innerText = "New Game"; return true;
                } else {
                    showModal(`🎉 Congratulations! 🎉`, `<strong style="color:${playersInfo[currentTurn].hex}">${playersInfo[currentTurn].name}</strong> finished in <strong>${rank}${suffix} Place!</strong><br><br><span style="font-size:14px;color:#ccc;">Game continues...</span>`, playersInfo[currentTurn].hex);
                    setTimeout(() => { closeModal(); nextTurn(); }, 3500); return true; 
                }
            } return false;
        }

        function finalizeMove() { 
            updateTokensPosition();  
            if (checkWinCondition()) { setAnimating(false); return; }
            if (diceValue === 6) { 
                isRolled = false; if (gameMode === 'online') { if (myOnlineId === 0) saveGameState(); } else { saveGameState(); }
                setAnimating(false);
                if(gameMode === 'bot' && playersInfo[currentTurn].isBot) { clearTimeout(botTurnTimeout); botTurnTimeout = setTimeout(() => diceClicked(currentTurn, true), 1200); } 
            } else { 
                setAnimating(false);
                if (gameMode === 'online') { if (myOnlineId === 0) nextTurn(); } else { nextTurn(); } 
            } 
        }
        
        function nextTurn() { 
            if (gameMode === 'online' && myOnlineId !== 0) return; 
            document.getElementById(`dice-${currentTurn}`).innerText = "🎲"; 
            do { currentTurnIndex = (currentTurnIndex + 1) % activePlayers.length; currentTurn = activePlayers[currentTurnIndex]; } while (finishedPlayers.includes(currentTurn) && finishedPlayers.length < activePlayers.length); 
            isRolled = false; updateTurnUI(); saveGameState(); 
        }

        function saveGameState() {
            const state = { version: GAME_VERSION, gameMode, activePlayers, finishedPlayers, playersInfoNames: playersInfo.map(p => p.name), playersInfoBots: playersInfo.map(p => p.isBot), currentTurnIndex, currentTurn, diceValue, isRolled, consecutiveSixes, tokenStates: tokens.map(t => ({ state: t.state, pos: t.pos })), diceBags };
            if (gameMode === 'online' && roomCode) { if (myOnlineId === 0) { db.ref('rooms/' + roomCode + '/state').set(state); } } else { localStorage.setItem('ludo_master_state', JSON.stringify(state)); }
        }

        function loadGameState() {
            const saved = localStorage.getItem('ludo_master_state');
            if (saved && gameMode !== 'online') {
                const data = JSON.parse(saved); if(data.version !== GAME_VERSION) { localStorage.removeItem('ludo_master_state'); initBoard(); return; }
                gameMode = data.gameMode || 'local'; activePlayers = data.activePlayers; finishedPlayers = data.finishedPlayers || []; if(data.playersInfoNames) data.playersInfoNames.forEach((n, i) => playersInfo[i].name = n); if(data.playersInfoBots) data.playersInfoBots.forEach((b, i) => playersInfo[i].isBot = b);
                currentTurnIndex = data.currentTurnIndex; currentTurn = data.currentTurn; diceValue = data.diceValue; isRolled = data.isRolled; consecutiveSixes = data.consecutiveSixes || 0;
                diceBags = data.diceBags || [[], [], [], []];
                initBoard(); init3DDiceEngine(); data.tokenStates.forEach((ts, idx) => { tokens[idx].state = ts.state; tokens[idx].pos = ts.pos; });
                if (isRolled && !finishedPlayers.includes(currentTurn)) document.getElementById(`dice-${currentTurn}`).innerText = diceFaces[diceValue - 1];
                document.getElementById('setup-screen').style.display = 'none'; document.getElementById('game-wrapper').style.display = 'flex';
                activePlayers.forEach(id => { let pnl = document.getElementById(`panel-${id}`); pnl.classList.add('in-game'); if(finishedPlayers.includes(id)) pnl.classList.add('finished'); });
                tokens.forEach(t => { if(activePlayers.includes(t.playerIndex)) t.el.classList.add('in-game'); });
                playersInfo.forEach((p, idx) => { document.getElementById(`name-display-${idx}`).innerText = p.name; });
                
                waitingForFirstInteraction = true;
                let turnName = playersInfo[currentTurn].name; let turnColor = playersInfo[currentTurn].hex; let isBotTurn = gameMode === 'bot' && playersInfo[currentTurn].isBot;
                let infoText = `<span style="color:${turnColor}; font-weight:bold;">${turnName}</span>'s turn${isBotTurn ? ' <span style="color:#aaa;">(Computer)</span>' : ''}`;
                document.getElementById('resume-turn-info').innerHTML = `Turn: ${infoText}`;
                document.getElementById('resume-overlay').style.display = 'flex';
                
                updateTurnUI(); setTimeout(updateTokensPosition, 100);
            } else { initBoard(); }
        }

        function clearGameState() { if(confirm("Exit and start a new game?")) { localStorage.removeItem('ludo_master_state'); if (gameMode === 'online' && roomCode && myOnlineId === 0) db.ref('rooms/' + roomCode).remove(); location.reload(); } }

        function continueFromLoad() {
            userHasInteracted = true; 
            waitingForFirstInteraction = false; 
            document.getElementById('resume-overlay').style.display = 'none';
            
            const allSounds = [killSound, spawnSound, homeSound, diceSound, moveSound, gameOverSound, safeSound];
            allSounds.forEach(s => { s.volume = 0; s.play().catch(()=>{}); s.pause(); s.volume = 1; s.currentTime = 0; });
            
            if (isRolled) {
                if (gameMode === 'bot' && playersInfo[currentTurn].isBot) { setTimeout(checkPossibleMoves, 600); } else { checkPossibleMoves(); }
            } else {
                if (gameMode === 'bot' && playersInfo[currentTurn].isBot) { clearTimeout(botTurnTimeout); botTurnTimeout = setTimeout(() => diceClicked(currentTurn, true), 800); }
            }
        }
        
        window.onload = () => { 
            loadGameState(); 
            window.lastGlobalClick = 0;
            const blockSpam = function(e) {
                if (!userHasInteracted) { userHasInteracted = true; }
                let now = Date.now();
                if (now - window.lastGlobalClick < 150) { e.stopPropagation(); if(e.cancelable) e.preventDefault(); return; }
                if (isRolling || isAnimating || isActionPending) { e.stopPropagation(); if(e.cancelable) e.preventDefault(); return; }
                if (gameMode === 'bot' && playersInfo[currentTurn].isBot) { e.stopPropagation(); if(e.cancelable) e.preventDefault(); return; }
                if (gameMode === 'online' && myOnlineId !== currentTurn) { e.stopPropagation(); if(e.cancelable) e.preventDefault(); return; }
                window.lastGlobalClick = now;
            };
            let bc = document.getElementById('board-container');
            bc.addEventListener('click', blockSpam, true);
            bc.addEventListener('touchstart', blockSpam, {capture: true, passive: false});
        };

        window.addEventListener('resize', () => { cacheBoardSize(); updateTokensPosition(); }); 
    </script>
